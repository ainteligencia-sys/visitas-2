<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Ventas - Glassmorphism (Static Github)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "recharts": "https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.359.0?deps=react@18.2.0"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #f8fafc; font-family: sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.8); }

    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 7s infinite; }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }
    select option { background: white; color: #334155; }
    
    /* Sticky para tabla de frecuencia */
    .freq-sticky-col { position: sticky; left: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); z-index: 10; }
    .freq-sticky-col-2 { position: sticky; left: 140px; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); z-index: 10; }
    @media (min-width: 768px) {
      .freq-sticky-col-2 { left: 200px; }
    }
  </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">
  
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #64748b;">
      <svg style="width: 40px; height: 40px; animation: spin 1s linear infinite;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      <h2 style="margin-top: 1rem; font-weight: bold;">Inicializando entorno...</h2>
    </div>
  </div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, ResponsiveContainer, Cell } from 'recharts';
    import { Box, Users, RotateCcw, Activity, Map as MapIcon, Trophy, Check, Info, Search, Table, AlertCircle, Loader2 } from 'lucide-react';

    // ==========================================
    // CONFIGURACIÓN DE ORIGEN DE DATOS
    // ==========================================
    // IMPORTANTE: Reemplaza esta URL con la ruta a tu archivo ZIP real en GitHub (Raw)
    const GITHUB_ZIP_URL = 'https://cdn.jsdelivr.net/gh/ainteligencia-sys/visitas-2@main/HISTORICO%20APPS%20DISTRILAB.zip'; 
    
    // ==========================================
    // UTILIDADES
    // ==========================================
    const COLORS = ['#10B981', '#3B82F6', '#F59E0B', '#6366F1', '#EC4899', '#8B5CF6', '#06B6D4'];

    const loadExternalScript = (url) => {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${url}"]`)) { resolve(); return; }
        const script = document.createElement('script');
        script.src = url; script.async = true; script.onload = resolve; script.onerror = reject;
        document.head.appendChild(script);
      });
    };

    const normalizeKeys = (item) => {
      const map = {
        'id_pedido': 'Id_pedido', 'pedido': 'Id_pedido',
        'id_cliente': 'id_cliente', 'cliente': 'id_cliente', 'farmacia': 'id_cliente',
        'id_usuario': 'id_usuario', 'usuario': 'id_usuario', 'vendedor': 'id_usuario',
        'nombre_producto': 'nombre_producto', 'producto': 'nombre_producto', 'codigo': 'nombre_producto',
        'descripcion_producto': 'descripcion_producto', 'descripcion': 'descripcion_producto', 'nombre': 'descripcion_producto',
        'tipo': 'TIPO',
        'drogueria de envio': 'Drogueria de envio', 'drogueria': 'Drogueria de envio',
        'cantidad': 'cantidad', 'unidades': 'cantidad', 'qty': 'cantidad',
        'total': 'total', 'monto': 'total', 'valor': 'total',
        'fecha': 'fecha'
      };
      const normalized = {};
      for (let key in item) {
         const cleanKey = key.trim();
         const lower = cleanKey.toLowerCase();
         const mappedKey = map[lower] || cleanKey;
         normalized[mappedKey] = item[key];
      }
      return normalized;
    };

    const toYYYYMMDD = (dateVal) => {
      if (!dateVal) return '';
      if (dateVal instanceof Date) {
        const offset = dateVal.getTimezoneOffset() * 60000;
        return new Date(dateVal.getTime() - offset).toISOString().split('T')[0];
      }
      const str = String(dateVal).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
      const partsSlash = str.split('/');
      if (partsSlash.length === 3) {
        return `${partsSlash[2].length === 2 ? '20'+partsSlash[2] : partsSlash[2]}-${partsSlash[1].padStart(2, '0')}-${partsSlash[0].padStart(2, '0')}`;
      }
      const partsDash = str.split('-');
      if (partsDash.length === 3 && partsDash[0].length <= 2) {
        return `${partsDash[2].length === 2 ? '20'+partsDash[2] : partsDash[2]}-${partsDash[1].padStart(2, '0')}-${partsDash[0].padStart(2, '0')}`;
      }
      // Parse de número de serie Excel a fecha (aprox)
      if (!isNaN(str) && Number(str) > 20000) {
        const excelEpoch = new Date(1899, 11, 30);
        const excelDate = new Date(excelEpoch.getTime() + Number(str) * 86400000);
        return excelDate.toISOString().split('T')[0];
      }
      return str;
    };

    const getVal = (obj, ...keys) => {
      for (let k of keys) { if (obj[k] !== undefined && obj[k] !== null && String(obj[k]).trim() !== "") return obj[k]; }
      return null;
    };

    const getProductDisplayName = (item) => item.descripcion_producto || item.nombre_producto || '-';

    const formatMoney = (val) => {
      const num = parseFloat(val);
      if (isNaN(num)) return '-';
      return num.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const monthLabel = (yyyyMM) => {
      const [y, m] = yyyyMM.split('-');
      const date = new Date(parseInt(y), parseInt(m) - 1, 1);
      return date.toLocaleString('es-ES', { month: 'short', year: '2-digit' });
    };

    const INITIAL_FILTERS = { farmacia: ['Todas'], tipo: ['Todas'], drogueria: ['Todas'], vendedor: ['Todos'], producto: ['Todos'], fechaInicio: '', fechaFin: '' };

    // ==========================================
    // COMPONENTES UI REUTILIZABLES
    // ==========================================
    const GlassBackground = () => (
      <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none bg-slate-50">
        <div className="absolute top-[-10%] left-[-10%] w-[30rem] h-[30rem] bg-indigo-300 rounded-full mix-blend-multiply filter blur-[120px] opacity-60 animate-blob"></div>
        <div className="absolute top-[20%] right-[-10%] w-[35rem] h-[35rem] bg-cyan-200 rounded-full mix-blend-multiply filter blur-[120px] opacity-70 animate-blob animation-delay-2000"></div>
        <div className="absolute bottom-[-20%] left-[10%] w-[40rem] h-[40rem] bg-purple-300 rounded-full mix-blend-multiply filter blur-[120px] opacity-50 animate-blob animation-delay-4000"></div>
        <div className="absolute bottom-[20%] right-[20%] w-[25rem] h-[25rem] bg-pink-200 rounded-full mix-blend-multiply filter blur-[120px] opacity-60 animate-blob animation-delay-2000"></div>
      </div>
    );

    function KpiCard({ title, value, borderColor, textColor }) {
      return (
        <div className={`bg-white/40 backdrop-blur-2xl shadow-xl shadow-slate-200/50 border border-white/60 border-t-4 ${borderColor} p-5 flex flex-col justify-center transform transition-all hover:-translate-y-1 hover:shadow-2xl rounded-2xl`}>
          <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 drop-shadow-sm">{title}</h3>
          <p className={`text-2xl md:text-3xl font-extrabold ${textColor} drop-shadow-sm`}>{value}</p>
        </div>
      );
    }

    function Card({ title, icon, children, bodyClass = "p-5" }) {
      return (
        <div className="bg-white/40 backdrop-blur-2xl shadow-xl shadow-slate-200/50 border border-white/60 flex flex-col h-full rounded-3xl overflow-hidden z-10">
          <div className="border-b border-white/50 px-6 py-4 flex items-center bg-white/30">
            {icon && <span className="mr-3">{icon}</span>}
            <h2 className="text-sm font-bold text-slate-600 uppercase tracking-wider drop-shadow-sm">{title}</h2>
          </div>
          <div className={`flex-grow ${bodyClass}`}>
            {children}
          </div>
        </div>
      );
    }

    function MultiSelect({ label, name, values, options, onChange, icon, allLabel }) {
      const [isOpen, setIsOpen] = useState(false);
      const [search, setSearch] = useState('');
      const containerRef = useRef(null);
      const allText = allLabel || 'Todas';
      const isAll = values.includes(allText) || values.length === 0;
      
      useEffect(() => {
        function handleClickOutside(e) { if (containerRef.current && !containerRef.current.contains(e.target)) setIsOpen(false); }
        if (isOpen) document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, [isOpen]);
      
      const otherOptions = options.filter(o => o !== allText);
      const filtered = search.trim() ? otherOptions.filter(o => o.toLowerCase().includes(search.toLowerCase())) : otherOptions;
      
      const toggleValue = (val) => {
        let newValues;
        if (val === allText) { newValues = [allText]; }
        else {
          if (values.includes(val)) {
            newValues = values.filter(v => v !== val);
            if (newValues.length === 0) newValues = [allText];
          } else { newValues = [...values.filter(v => v !== allText), val]; }
        }
        onChange({ target: { name, value: newValues } });
      };
      
      const displayLabel = isAll ? allText : values.length === 1 ? values[0] : `${values.length} seleccionados`;
      
      return (
        <div className="flex flex-col relative z-30" ref={containerRef}>
          <label className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5 drop-shadow-sm">{label}</label>
          <div className="relative">
            <button type="button" onClick={() => setIsOpen(!isOpen)}
              className="w-full text-left text-sm bg-white/50 backdrop-blur-md border border-white/60 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-400 focus:outline-none text-slate-700 font-semibold transition-all hover:bg-white/60 shadow-sm flex items-center justify-between min-h-[42px]">
              <span className="truncate flex items-center">
                {icon && <span className="mr-2 flex-shrink-0">{icon}</span>}
                <span className="truncate">{displayLabel}</span>
              </span>
            </button>
            {isOpen && (
              <div className="absolute top-full left-0 right-0 mt-2 bg-white/90 backdrop-blur-xl border border-white/60 rounded-xl shadow-2xl z-50 overflow-hidden">
                <div className="p-2 border-b border-white/40 flex items-center gap-2">
                  <Search className="w-4 h-4 text-slate-400 flex-shrink-0" />
                  <input type="text" placeholder="Buscar..." value={search} onChange={(e) => setSearch(e.target.value)}
                    className="w-full text-sm bg-transparent border-none focus:ring-0 focus:outline-none text-slate-700 placeholder-slate-400" autoFocus />
                </div>
                <div className="max-h-56 overflow-y-auto p-1">
                  <label className="flex items-center px-3 py-2 hover:bg-blue-50/50 rounded-lg cursor-pointer transition-colors">
                    <input type="checkbox" checked={isAll} onChange={() => toggleValue(allText)} className="mr-3 h-4 w-4 text-blue-600 rounded border-slate-300" />
                    <span className="text-sm font-bold text-slate-700">{allText}</span>
                  </label>
                  {filtered.map((opt, i) => (
                    <label key={i} className="flex items-center px-3 py-2 hover:bg-blue-50/50 rounded-lg cursor-pointer transition-colors">
                      <input type="checkbox" checked={values.includes(opt)} onChange={() => toggleValue(opt)} className="mr-3 h-4 w-4 text-blue-600 rounded border-slate-300" />
                      <span className="text-sm text-slate-700 truncate" title={opt}>{opt}</span>
                    </label>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // APLICACIÓN PRINCIPAL
    // ==========================================
    function App() {
      const [rawData, setRawData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [loadingStep, setLoadingStep] = useState('Iniciando...');
      const [error, setError] = useState(null);
      
      const [tempFilters, setTempFilters] = useState(INITIAL_FILTERS);
      const [appliedFilters, setAppliedFilters] = useState(INITIAL_FILTERS);
      const [defaultInitialFilters, setDefaultInitialFilters] = useState(INITIAL_FILTERS);
      const [dateWarning, setDateWarning] = useState('');
      const [serverMeta, setServerMeta] = useState({ serverMaxDate: null, serverMinDate: null });

      // 1. CARGA DE DATOS ESTÁTICOS DESDE GITHUB (JSZip -> CSV/XLSX -> JSON)
      useEffect(() => {
        const fetchStaticData = async () => {
          try {
            setLoading(true);
            
            // Cargar librerías necesarias
            setLoadingStep('Cargando motores de procesamiento (JSZip, PapaParse, XLSX)...');
            await loadExternalScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
            await loadExternalScript('https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js');
            await loadExternalScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');

            setLoadingStep('Descargando archivo ZIP desde GitHub...');
            const response = await fetch(GITHUB_ZIP_URL);
            if (!response.ok) throw new Error(`Error HTTP descargando datos: ${response.status}`);
            const blob = await response.blob();

            setLoadingStep('Descomprimiendo archivo...');
            const zip = new window.JSZip();
            const loadedZip = await zip.loadAsync(blob);
            
            const filenames = Object.keys(loadedZip.files).filter(name => !loadedZip.files[name].dir && !name.includes('__MACOSX'));
            if (filenames.length === 0) throw new Error("El archivo ZIP está vacío.");
            const firstFilename = filenames[0];
            const extension = firstFilename.split('.').pop().toLowerCase();
            
            let jsonData = [];

            if (extension === 'csv' || extension === 'txt') {
              setLoadingStep(`Procesando archivo CSV: ${firstFilename}...`);
              const fileString = await loadedZip.files[firstFilename].async("string");
              const parseResult = window.Papa.parse(fileString, { header: true, skipEmptyLines: true });
              jsonData = parseResult.data;
            } else {
              setLoadingStep(`Procesando archivo Excel: ${firstFilename}...`);
              const fileData = await loadedZip.files[firstFilename].async("uint8array");
              const workbook = window.XLSX.read(fileData, { type: 'array' });
              const firstSheetName = workbook.SheetNames[0];
              const worksheet = workbook.Sheets[firstSheetName];
              jsonData = window.XLSX.utils.sheet_to_json(worksheet, { defval: "" });
            }

            // Normalización de llaves al formato esperado por el frontend
            setLoadingStep('Normalizando información de ventas...');
            const datosLimpios = jsonData.map(normalizeKeys);
            setRawData(datosLimpios);

            // Calcular fechas máximas y mínimas
            let maxDateStr = "";
            datosLimpios.forEach(item => {
              if (item.fecha) {
                const dStr = toYYYYMMDD(item.fecha);
                if (!maxDateStr || dStr > maxDateStr) maxDateStr = dStr;
              }
            });

            let initialWithDates = { ...INITIAL_FILTERS };
            let minDateStr = "";
            if (maxDateStr) {
              const maxDateObj = new Date(maxDateStr + 'T00:00:00');
              const minDateObj = new Date(maxDateObj.getTime() - (60 * 24 * 60 * 60 * 1000)); // Default: últimos 60 días
              minDateStr = minDateObj.toISOString().split('T')[0];
              
              initialWithDates.fechaInicio = minDateStr;
              initialWithDates.fechaFin = maxDateStr;
            }

            setServerMeta({ serverMaxDate: maxDateStr, serverMinDate: minDateStr });
            setDefaultInitialFilters(initialWithDates);
            setTempFilters(initialWithDates);
            setAppliedFilters(initialWithDates);
            
            setLoading(false);
          } catch (err) {
            setError(err.message);
            setLoading(false);
          }
        };

        fetchStaticData();
      }, []);

      // 2. OPCIONES DE FILTROS (Dinamicos según los datos crudos)
      const opciones = useMemo(() => {
        const uniqueValues = (key, fallbackKey) => {
          const vals = new Set();
          rawData.forEach(item => {
            const v = item[key] || (fallbackKey ? item[fallbackKey] : null);
            if (v !== undefined && v !== null && String(v).trim() !== '') vals.add(String(v).trim());
          });
          return ['Todas', ...Array.from(vals).sort()];
        };
        const uniqueValuesTodos = (key, fallbackKey) => {
          const vals = new Set();
          rawData.forEach(item => {
            const v = item[key] || (fallbackKey ? item[fallbackKey] : null);
            if (v !== undefined && v !== null && String(v).trim() !== '') vals.add(String(v).trim());
          });
          return ['Todos', ...Array.from(vals).sort()];
        };
        return {
          farmacias: uniqueValues('id_cliente'),
          tipos: uniqueValues('TIPO'),
          droguerias: uniqueValues('Drogueria de envio'),
          vendedores: uniqueValuesTodos('id_usuario'),
          productos: uniqueValuesTodos('descripcion_producto', 'nombre_producto'),
        };
      }, [rawData]);

      const hasPendingChanges = JSON.stringify(tempFilters) !== JSON.stringify(appliedFilters);

      // 3. APLICACIÓN DE FILTROS
      const filteredData = useMemo(() => {
        return rawData.filter(item => {
          const fFarmacia = appliedFilters.farmacia;
          const fTipo = appliedFilters.tipo;
          const fDrogueria = appliedFilters.drogueria;
          const fVendedor = appliedFilters.vendedor;
          const fProducto = appliedFilters.producto;

          const matchFarmacia = fFarmacia.includes('Todas') || fFarmacia.length === 0 || fFarmacia.includes(String(item.id_cliente || '').trim());
          const matchTipo = fTipo.includes('Todas') || fTipo.length === 0 || fTipo.includes(String(item.TIPO || '').trim());
          const matchDrogueria = fDrogueria.includes('Todas') || fDrogueria.length === 0 || fDrogueria.includes(String(item['Drogueria de envio'] || '').trim());
          const matchVendedor = fVendedor.includes('Todos') || fVendedor.length === 0 || fVendedor.includes(String(item.id_usuario || '').trim());
          const prodName = getProductDisplayName(item);
          const matchProducto = fProducto.includes('Todos') || fProducto.length === 0 || fProducto.includes(prodName);
          
          let matchFecha = true;
          if (appliedFilters.fechaInicio || appliedFilters.fechaFin) {
            if (!item.fecha) { matchFecha = false; } 
            else {
              const itemFechaStr = toYYYYMMDD(item.fecha);
              if (appliedFilters.fechaInicio && itemFechaStr < appliedFilters.fechaInicio) matchFecha = false;
              if (appliedFilters.fechaFin && itemFechaStr > appliedFilters.fechaFin) matchFecha = false;
            }
          }
          return matchFarmacia && matchTipo && matchDrogueria && matchVendedor && matchProducto && matchFecha;
        });
      }, [rawData, appliedFilters]);

      // 4. MÉTRICAS Y GRÁFICOS (Frontend Aggregation)
      const metrics = useMemo(() => {
        let totalGeneral = 0; let transferencias = new Set(); let farmaciasActivas = new Set(); let skus = new Set();
        const monthlyDataMap = {}; const clientsMap = {}; const productsMap = {}; const vendorsMap = {};

        filteredData.forEach(item => {
          // Normalizar montos extraños si vienen con signos de $ o puntos
          let montoStr = String(item.total).replace(/[$\s]/g, '');
          if (montoStr.indexOf(',') > -1 && montoStr.indexOf('.') > -1) {
            montoStr = montoStr.replace(/\./g, '').replace(',', '.');
          } else if (montoStr.indexOf(',') > -1) {
             montoStr = montoStr.replace(',', '.');
          }
          const monto = parseFloat(montoStr) || 0;
          
          totalGeneral += monto;
          if(item.Id_pedido) transferencias.add(item.Id_pedido);
          if(item.id_cliente) farmaciasActivas.add(item.id_cliente);
          if(item.nombre_producto || item.descripcion_producto) skus.add(getProductDisplayName(item));

          if(item.fecha) {
            const fechaStr = toYYYYMMDD(item.fecha);
            const partes = fechaStr.split('-');
            if(partes.length === 3) {
              const dateStr = `${new Date(partes[0], partes[1] - 1, partes[2]).toLocaleString('es-ES', { month: 'short' })}-${partes[0]}`;
              monthlyDataMap[dateStr] = (monthlyDataMap[dateStr] || 0) + monto;
            }
          }

          if (item.id_cliente) clientsMap[item.id_cliente] = (clientsMap[item.id_cliente] || 0) + monto;
          const prodName = getProductDisplayName(item);
          if (prodName && prodName !== '-') productsMap[prodName] = (productsMap[prodName] || 0) + monto;

          if (item.id_usuario) {
            if (!vendorsMap[item.id_usuario]) vendorsMap[item.id_usuario] = { total: 0, clientes: new Set() };
            vendorsMap[item.id_usuario].total += monto;
            if(item.id_cliente) vendorsMap[item.id_usuario].clientes.add(item.id_cliente);
          }
        });

        return {
          totalGeneral, transferencias: transferencias.size, farmaciasActivas: farmaciasActivas.size, skus: skus.size,
          chartMonthly: Object.keys(monthlyDataMap).map(k => ({ mes: k, total: monthlyDataMap[k] })),
          chartClients: Object.entries(clientsMap).map(([name, val]) => ({ name, value: val })).sort((a,b) => b.value - a.value).slice(0, 5),
          chartProducts: Object.entries(productsMap).map(([name, val]) => ({ name, value: val })).sort((a,b) => b.value - a.value).slice(0, 6),
          rankingVendors: Object.entries(vendorsMap).map(([name, data]) => ({ name, total: data.total, clientes: data.clientes.size })).sort((a,b) => b.total - a.total)
        };
      }, [filteredData]);

      // 5. CÁLCULO DE FRECUENCIA MENSUAL EN EL FRONTEND (Reemplazo del Endpoint Secundario)
      const freqData = useMemo(() => {
        if (filteredData.length === 0) return { months: [], rows: [] };
        const agg = {}; const monthSet = new Set();
        
        filteredData.forEach(row => {
          if (!row.fecha) return;
          const dStr = toYYYYMMDD(row.fecha);
          if (!dStr) return;
          const monthKey = dStr.substring(0, 7); // yyyy-MM
          monthSet.add(monthKey);
          
          const cliente = String(row.id_cliente || '').trim();
          const prodCode = String(row.nombre_producto || '').trim();
          const prodDesc = String(row.descripcion_producto || '').trim();
          const producto = prodDesc || prodCode || 'SIN NOMBRE';
          
          if (!cliente) return;
          
          let montoStr = String(row.total).replace(/[$\s]/g, '');
          if (montoStr.indexOf(',') > -1 && montoStr.indexOf('.') > -1) { montoStr = montoStr.replace(/\./g, '').replace(',', '.'); } 
          else if (montoStr.indexOf(',') > -1) { montoStr = montoStr.replace(',', '.'); }
          const monto = parseFloat(montoStr) || 0;
          
          const key = cliente + '|' + producto + '|' + prodCode;
          if (!agg[key]) agg[key] = { cliente, producto, productoCode: prodCode, months: {}, totalCount: 0, totalAmount: 0 };
          if (!agg[key].months[monthKey]) agg[key].months[monthKey] = { count: 0, total: 0 };
          
          agg[key].months[monthKey].count += 1;
          agg[key].months[monthKey].total += monto;
          agg[key].totalCount += 1;
          agg[key].totalAmount += monto;
        });

        return {
          months: Array.from(monthSet).sort(),
          rows: Object.values(agg).sort((a, b) => b.totalAmount - a.totalAmount)
        };
      }, [filteredData]);

      // Handlers de UI
      const handleFilterChange = (e) => {
        const { name, value } = e.target;
        let newFilters = { ...tempFilters, [name]: value };
        if (name === 'fechaInicio' || name === 'fechaFin') {
          if (newFilters.fechaInicio && newFilters.fechaFin) {
            const d1 = new Date(newFilters.fechaInicio + 'T00:00:00');
            const d2 = new Date(newFilters.fechaFin + 'T00:00:00');
            if ((d2 - d1) / 86400000 > 60) {
              setDateWarning('Se ha limitado a 60 días el filtro para rendimiento.');
              setTimeout(() => setDateWarning(''), 5000);
              if (name === 'fechaInicio') { newFilters.fechaFin = new Date(d1.getTime() + 60*86400000).toISOString().split('T')[0]; } 
              else { newFilters.fechaInicio = new Date(d2.getTime() - 60*86400000).toISOString().split('T')[0]; }
            } else if (d2 < d1) {
              newFilters.fechaInicio = newFilters.fechaFin;
            }
          }
        }
        setTempFilters(newFilters);
      };

      const customTooltipStyle = { backgroundColor: 'rgba(255, 255, 255, 0.7)', backdropFilter: 'blur(10px)', border: '1px solid rgba(255,255,255,0.6)', borderRadius: '12px', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)' };

      // Renderizados Condicionales
      if (loading) return (
        <div className="relative min-h-screen flex flex-col items-center justify-center text-slate-600 overflow-hidden">
           <GlassBackground />
           <div className="relative z-10 bg-white/40 backdrop-blur-xl border border-white/60 shadow-2xl rounded-3xl p-10 flex flex-col items-center w-80 md:w-96 text-center">
             <Loader2 className="w-12 h-12 animate-spin text-blue-500 mb-4" />
             <span className="font-bold text-xl text-slate-700">Cargando datos...</span>
             <span className="text-sm text-slate-500 mt-2">{loadingStep}</span>
           </div>
        </div>
      );
      
      if (error) return (
        <div className="relative min-h-screen flex flex-col items-center justify-center text-slate-700 p-6 text-center overflow-hidden">
          <GlassBackground />
          <div className="relative z-10 bg-white/50 backdrop-blur-xl text-red-600 p-8 rounded-3xl border border-white/60 shadow-2xl max-w-lg w-full">
            <AlertCircle className="w-12 h-12 mx-auto mb-4 text-red-500" />
            <h3 className="font-bold text-2xl mb-2">Ha ocurrido un error</h3>
            <p className="text-sm font-mono bg-white/50 p-4 rounded-xl border border-white/50 text-red-700 mb-6">{error}</p>
            <button onClick={() => window.location.reload()} className="px-6 py-3 bg-red-500/90 text-white font-semibold rounded-xl hover:bg-red-600">Reintentar</button>
          </div>
        </div>
      );

      // UI PRINCIPAL
      return (
        <div className="relative min-h-screen p-4 md:p-8 font-sans text-slate-800 overflow-hidden">
          <GlassBackground />
          <div className="relative z-10">
            
            {/* FILTROS */}
            <div className="bg-white/40 backdrop-blur-2xl rounded-3xl shadow-[0_8px_32px_0_rgba(31,38,135,0.07)] border border-white/60 p-6 mb-6">
              <div className="bg-white/30 backdrop-blur-md rounded-2xl p-4 border border-blue-300/50 mb-5 relative shadow-inner">
                <h3 className="text-xs font-bold text-blue-700 uppercase tracking-wide mb-3 flex items-center">
                  Filtro de Fechas (Máx 60 días)
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="flex flex-col">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">PERÍODO DESDE</label>
                    <input type="date" name="fechaInicio" value={tempFilters.fechaInicio} onChange={handleFilterChange} 
                      className="w-full text-sm bg-white/70 backdrop-blur-md border border-white/80 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-400 font-semibold" />
                  </div>
                  <div className="flex flex-col">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">PERÍODO HASTA</label>
                    <input type="date" name="fechaFin" value={tempFilters.fechaFin} onChange={handleFilterChange} 
                      className="w-full text-sm bg-white/70 backdrop-blur-md border border-white/80 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-400 font-semibold" />
                  </div>
                </div>
                {dateWarning && (
                  <div className="absolute -bottom-3 left-1/2 transform -translate-x-1/2 bg-amber-100/90 text-amber-700 text-xs font-bold px-3 py-1 rounded-full animate-bounce z-10">
                    {dateWarning}
                  </div>
                )}
              </div>

              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3 pl-2">Filtros Secundarios</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                <MultiSelect label="FARMACIA" name="farmacia" values={tempFilters.farmacia} options={opciones.farmacias} onChange={handleFilterChange} icon={<Box className="w-4 h-4"/>} />
                <MultiSelect label="TIPO" name="tipo" values={tempFilters.tipo} options={opciones.tipos} onChange={handleFilterChange} />
                <MultiSelect label="DROGUERÍA" name="drogueria" values={tempFilters.drogueria} options={opciones.droguerias} onChange={handleFilterChange} />
                <MultiSelect label="VENDEDOR" name="vendedor" values={tempFilters.vendedor} options={opciones.vendedores} onChange={handleFilterChange} icon={<Users className="w-4 h-4"/>} allLabel="Todos" />
                <MultiSelect label="PRODUCTO" name="producto" values={tempFilters.producto} options={opciones.productos} onChange={handleFilterChange} icon={<Box className="w-4 h-4"/>} allLabel="Todos" />
              </div>

              <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="text-sm font-medium text-slate-500 bg-white/30 px-4 py-2 rounded-lg border border-white/40">
                  Mostrando <span className="text-blue-600 font-bold">{filteredData.length}</span> de <span className="font-bold">{rawData.length}</span> registros globales.
                </div>
                <div className="flex gap-3">
                  <button onClick={() => {setTempFilters(defaultInitialFilters); setAppliedFilters(defaultInitialFilters)}} className="flex items-center px-5 py-2.5 bg-white/40 hover:bg-white/60 text-slate-600 text-sm font-bold rounded-xl shadow-sm">
                    <RotateCcw className="w-4 h-4 mr-2" /> LIMPIAR
                  </button>
                  <button onClick={() => setAppliedFilters(tempFilters)} disabled={!hasPendingChanges} className={`flex items-center px-6 py-2.5 text-sm font-bold rounded-xl shadow-lg transition-all ${hasPendingChanges ? 'bg-blue-500 text-white hover:bg-blue-600' : 'bg-white/30 text-slate-400'}`}>
                    <Check className="w-4 h-4 mr-2" /> APLICAR
                  </button>
                </div>
              </div>
            </div>

            {/* KPIs */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-6">
              <KpiCard title="TOTAL VENTAS" value={formatMoney(metrics.totalGeneral)} borderColor="border-emerald-400" textColor="text-emerald-600" />
              <KpiCard title="TRANSFERENCIAS" value={metrics.transferencias} borderColor="border-blue-400" textColor="text-blue-600" />
              <KpiCard title="FARMACIAS ACTIVAS" value={metrics.farmaciasActivas} borderColor="border-purple-400" textColor="text-purple-600" />
              <KpiCard title="MIX (SKUS)" value={metrics.skus} borderColor="border-amber-400" textColor="text-amber-600" />
            </div>

            {/* GRÁFICOS */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
              <Card title="TENDENCIA MENSUAL ($)" icon={<Activity className="w-5 h-5 text-emerald-500"/>}>
                <div className="h-64 w-full mt-4">
                  {metrics.chartMonthly.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={metrics.chartMonthly} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(255,255,255,0.4)" />
                        <XAxis dataKey="mes" axisLine={false} tickLine={false} tick={{fontSize: 11, fill: '#64748b'}} />
                        <YAxis axisLine={false} tickLine={false} tick={{fontSize: 11, fill: '#64748b'}} tickFormatter={v => formatMoney(v)} />
                        <RechartsTooltip contentStyle={customTooltipStyle} formatter={v => [formatMoney(v), 'Total']} />
                        <Line type="monotone" dataKey="total" stroke="#10B981" strokeWidth={4} dot={{r: 5, fill: '#10B981'}} />
                      </LineChart>
                    </ResponsiveContainer>
                  ) : <div className="text-slate-400 text-sm flex h-full items-center justify-center">Sin datos suficientes.</div>}
                </div>
              </Card>

              <Card title="TOP 5 CLIENTES ($)" icon={<Users className="w-5 h-5 text-blue-500"/>}>
                 <div className="h-64 w-full mt-4">
                  {metrics.chartClients.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={metrics.chartClients} layout="vertical" margin={{ top: 10, right: 30, left: 40, bottom: 0 }}>
                        <XAxis type="number" hide />
                        <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fontSize: 10, fill: '#475569'}} />
                        <RechartsTooltip contentStyle={customTooltipStyle} formatter={v => [formatMoney(v), 'Total']} />
                        <Bar dataKey="value" fill="#3B82F6" radius={[0, 6, 6, 0]} barSize={24} />
                      </BarChart>
                    </ResponsiveContainer>
                  ) : <div className="text-slate-400 text-sm flex h-full items-center justify-center">Sin datos suficientes.</div>}
                </div>
              </Card>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
              <div className="lg:col-span-2">
                 <Card title="TOP PRODUCTOS ($)" icon={<Box className="w-5 h-5 text-purple-500"/>}>
                  <div className="h-72 w-full pt-2">
                    {metrics.chartProducts.length > 0 ? (
                      <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={metrics.chartProducts} layout="vertical" margin={{ top: 10, right: 30, left: 10, bottom: 0 }}>
                          <XAxis type="number" axisLine={false} tickLine={false} tick={{fontSize: 11}} tickFormatter={v => formatMoney(v)} />
                          <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fontSize: 10}} width={160} />
                          <RechartsTooltip contentStyle={customTooltipStyle} formatter={v => [formatMoney(v), 'Total']} />
                          <Bar dataKey="value" radius={[0, 6, 6, 0]} barSize={22}>
                            {metrics.chartProducts.map((_, idx) => <Cell key={`c-${idx}`} fill={COLORS[idx % COLORS.length]} />)}
                          </Bar>
                        </BarChart>
                      </ResponsiveContainer>
                    ) : <div className="text-slate-400 text-sm">Sin datos suficientes.</div>}
                  </div>
                </Card>
              </div>

              <Card title="DISTRIBUCIÓN GEOGRÁFICA" icon={<MapIcon className="w-5 h-5 text-emerald-500"/>} bodyClass="p-0 overflow-hidden rounded-b-3xl">
                 <div className="h-72 w-full bg-slate-100/30 relative">
                   <iframe width="100%" height="100%" frameBorder="0" scrolling="no" src="https://www.openstreetmap.org/export/embed.html?bbox=-74.0039%2C8.0157%2C-69.873%2C11.824&amp;layer=mapnik" className="opacity-80 mix-blend-luminosity hover:mix-blend-normal"></iframe>
                 </div>
              </Card>
            </div>

            {/* TABLAS - RANKINGS */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
              <Card title="RANKING VENDEDORES" icon={<Trophy className="w-5 h-5 text-amber-500"/>} bodyClass="p-0">
                <div className="overflow-x-auto max-h-[350px]">
                  <table className="w-full text-left text-sm whitespace-nowrap">
                    <thead className="bg-white/40 backdrop-blur-md text-slate-500 uppercase sticky top-0 border-b border-white/50 z-10">
                      <tr>
                        <th className="px-5 py-3.5 font-bold text-center">#</th>
                        <th className="px-5 py-3.5 font-bold">Vendedor</th>
                        <th className="px-5 py-3.5 font-bold text-center">Clientes</th>
                        <th className="px-5 py-3.5 font-bold text-right">Total Vendido</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-white/30">
                      {metrics.rankingVendors.map((v, i) => (
                        <tr key={i} className="hover:bg-white/50">
                          <td className="px-5 py-3.5 text-center text-lg">{i===0?'🏆':i===1?'🥈':i===2?'🥉':i+1}</td>
                          <td className="px-5 py-3.5 font-bold text-slate-700">{v.name}</td>
                          <td className="px-5 py-3.5 text-center font-bold text-blue-700">{v.clientes}</td>
                          <td className="px-5 py-3.5 font-bold text-emerald-600 text-right">{formatMoney(v.total)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </Card>

              <Card title="FRECUENCIA MENSUAL: CLIENTE x PRODUCTO" icon={<Table className="w-5 h-5 text-indigo-500"/>} bodyClass="p-0 overflow-hidden">
                {freqData.rows.length === 0 ? (
                  <div className="p-8 text-center text-slate-400 font-medium">No hay datos históricos suficientes.</div>
                ) : (
                  <div className="overflow-x-auto max-h-[350px]">
                    <table className="w-full text-left text-sm whitespace-nowrap">
                      <thead className="bg-white/60 backdrop-blur-md text-slate-500 uppercase sticky top-0 border-b border-white/50 z-20">
                        <tr>
                          <th className="freq-sticky-col px-4 py-3.5 font-bold min-w-[140px] border-r border-white/30">Cliente</th>
                          <th className="freq-sticky-col-2 px-4 py-3.5 font-bold min-w-[180px] border-r border-white/30">Producto</th>
                          {freqData.months.map(m => (
                            <th key={m} className="px-3 py-3.5 font-bold text-center border-r border-white/20">
                              <div className="text-[10px] text-slate-400">{m.split('-')[0]}</div>
                              <div className="text-xs">{monthLabel(m)}</div>
                            </th>
                          ))}
                          <th className="px-4 py-3.5 font-bold text-center bg-white/40">Veces</th>
                          <th className="px-4 py-3.5 font-bold text-right bg-white/40">Total $</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-white/30">
                        {freqData.rows.map((row, idx) => (
                          <tr key={idx} className="hover:bg-white/50">
                            <td className="freq-sticky-col px-4 py-3 font-bold text-slate-700 border-r border-white/20 max-w-[200px] truncate">{row.cliente}</td>
                            <td className="freq-sticky-col-2 px-4 py-3 text-slate-600 border-r border-white/20 max-w-[200px] truncate">{row.producto}</td>
                            {freqData.months.map(m => {
                              const cell = row.months[m];
                              return (
                                <td key={m} className="px-3 py-3 text-center border-r border-white/10">
                                  {cell ? (
                                    <span className={`inline-flex items-center justify-center w-7 h-7 rounded-md font-bold text-xs shadow-sm
                                      ${cell.count >= 3 ? 'bg-emerald-100 text-emerald-700' : cell.count >= 2 ? 'bg-blue-100 text-blue-700' : 'bg-white/60 text-slate-600'}`}
                                      title={`$${formatMoney(cell.total)}`}
                                    >{cell.count}</span>
                                  ) : <span className="text-slate-300">—</span>}
                                </td>
                              );
                            })}
                            <td className="px-4 py-3 text-center font-bold text-slate-700 border-r border-white/20">{row.totalCount}</td>
                            <td className="px-4 py-3 text-right font-bold text-emerald-600">{formatMoney(row.totalAmount)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </Card>
            </div>

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
